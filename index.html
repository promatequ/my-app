<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI手相占い - 2値化解析版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f2f5; color: #2c3e50; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a2a6c; margin-bottom: 10px; font-size: 1.8em; }
        .description { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; }
        .btn { display: inline-block; background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: #fff; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1em; font-weight: bold; border: none; }
        
        #loading { display: none; margin: 20px 0; color: #b21f1f; font-weight: bold; }
        
        canvas { max-width: 100%; height: auto; border: 2px solid #ecf0f1; border-radius: 10px; margin-top: 20px; display: none; }
        #result { text-align: left; background: #fdfdfd; padding: 20px; border-radius: 10px; border-left: 5px solid #1a2a6c; margin-top: 25px; display: none; }
        #controls { display: none; margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .line-result { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .line-title { font-weight: bold; color: #b21f1f; }
        .analysis-tag { display: inline-block; background: #34495e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75em; margin-left: 10px; }
        input[type="range"] { width: 80%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ AI 2値化手相鑑定</h1>
    <p class="description">コントラストを調整して掌線を浮かび上がらせてください</p>
    
    <label class="btn">
        写真を撮影・選択する
        <input type="file" accept="image/*" capture="environment" id="imageInput" style="display:none;">
    </label>

    <div id="loading">✨ 解析中... ✨</div>

    <div id="controls">
        <label>コントラスト（2値化感度）: <span id="contrastVal">128</span></label><br>
        <input type="range" id="contrastSlider" min="0" max="255" value="128">
        <p style="font-size: 12px; color: #666;">※掌線が黒く見えるように調整してください</p>
    </div>

    <canvas id="canvas"></canvas>
    <div id="result"></div>
</div>

<!-- Worker用スクリプト: 2値化処理 -->
<script id="worker-script" type="text/javascript-worker">
    self.onmessage = function(e) {
        const { imageData, width, height, threshold } = e.data;
        const data = imageData.data;
        const output = new Uint8ClampedArray(data.length);
        let stats = { life: 0, head: 0, heart: 0, fate: 0 };

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const i = (y * width + x) * 4;
                
                // 輝度の算出（BT.601）
                const brightness = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                
                // 2値化: しきい値より暗ければ黒（掌線）、明るければ白（肌）
                const isLine = brightness < threshold;
                const color = isLine ? 0 : 255;

                output[i] = output[i+1] = output[i+2] = color;
                output[i+3] = 255; // Alpha

                // 2値化データを元に各エリアの「黒ピクセル数」をカウント
                if (isLine) {
                    if (x < width * 0.4 && y > height * 0.45) stats.life++;
                    else if (y > height * 0.35 && y < height * 0.6) stats.head++;
                    else if (y < height * 0.4) stats.heart++;
                    if (x > width * 0.45 && x < width * 0.55 && y > height * 0.2) stats.fate++;
                }
            }
        }
        self.postMessage({ output, stats });
    };
</script>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultDiv = document.getElementById('result');
    const controlsDiv = document.getElementById('controls');
    const loadingDiv = document.getElementById('loading');
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastVal = document.getElementById('contrastVal');

    let currentImg = null;

    const blob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
    const worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = function(e) {
        const { output, stats } = e.data;
        const imageData = new ImageData(output, canvas.width, canvas.height);
        ctx.putImageData(imageData, 0, 0);
        
        loadingDiv.style.display = 'none';
        canvas.style.display = 'block';
        controlsDiv.style.display = 'block';
        generateFortune(stats, canvas.width * canvas.height);
    };

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        canvas.style.display = 'none';
        
        const img = new Image();
        img.onload = () => {
            currentImg = img;
            processImage();
        };
        img.src = URL.createObjectURL(file);
        this.value = '';
    });

    // スライダー操作時に再解析
    contrastSlider.addEventListener('input', () => {
        contrastVal.textContent = contrastSlider.value;
        if (currentImg) {
            processImage();
        }
    });

    function processImage() {
        // 解像度を抑えてフリーズを防止
        const MAX_SIZE = 500; 
        let width = currentImg.width;
        let height = currentImg.height;
        
        if (width > height) {
            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
        } else {
            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
        }
        
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(currentImg, 0, 0, width, height);

        const imageData = ctx.getImageData(0, 0, width, height);

        worker.postMessage({
            imageData,
            width,
            height,
            threshold: parseInt(contrastSlider.value)
        });
    }

    function generateFortune(stats, total) {
        const ratio = {
            life: (stats.life / total) * 100,
            head: (stats.head / total) * 100,
            heart: (stats.heart / total) * 100,
            fate: (stats.fate / total) * 100
        };

        let html = "<h2 style='text-align:center;'>鑑定結果</h2>";
        const lines = [
            { name: "生命線", val: ratio.life, good: "生命力に満ち溢れ、非常にタフな運勢です。", bad: "少し休息が必要なサイン。規則正しい生活を。", th: 1.5 },
            { name: "知能線", val: ratio.head, good: "鋭い判断力と集中力を持っています。", bad: "直感力が冴えています。考えすぎに注意。", th: 1.5 },
            { name: "感情線", val: ratio.heart, good: "対人運が良好で、愛情深い時期です。", bad: "感情が安定しており、冷静な判断ができます。", th: 1.5 },
            { name: "運命線", val: ratio.fate, good: "目標に向かって強い意志が働いています。", bad: "今は準備期間。新しい挑戦を控えて吉。", th: 0.5 }
        ];

        lines.forEach(l => {
            const status = l.val > l.th ? "明瞭" : "変化期";
            html += `<div class="line-result"><div class="line-title">${l.name}<span class="analysis-tag">${status}</span></div>`;
            html += l.val > l.th ? l.good : l.bad;
            html += "</div>";
        });

        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
