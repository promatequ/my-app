<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI簡易手相占い - コントラスト調整版</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 1.5em; }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        #result {
            font-size: 1.1em;
            line-height: 1.6;
            text-align: left;
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        #loading {
            display: none;
            color: #007bff;
            font-weight: bold;
            margin-bottom: 20px;
        }
        /* 追加: コントラスト調整パネルのスタイル */
        #controls {
            display: none;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .slider-label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input[type="range"] {
            width: 80%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ スマホで手相占い</h1>
    <p>手のひらを明るい場所で撮影してください</p>
    
    <label class="btn">
        カメラで撮影 / 画像を選択
        <input type="file" accept="image/*" capture="environment" id="imageInput">
    </label>

    <div id="loading">手相を解析中...</div>

    <!-- 追加: コントラスト調整パネル -->
    <div id="controls">
        <label class="slider-label" for="contrastSlider">
            皺（しわ）の抽出感度: <span id="contrastVal">100</span>%
        </label>
        <input type="range" id="contrastSlider" min="50" max="300" value="100">
        <p style="font-size: 0.8em; color: #666; margin-top: 5px;">スライダーを動かすと、線の拾い具合が変わります</p>
    </div>

    <canvas id="canvas"></canvas>
    <div id="result"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    const loadingDiv = document.getElementById('loading');
    const controlsDiv = document.getElementById('controls');
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastVal = document.getElementById('contrastVal');

    let currentImg = null; // 読み込んだ画像を保持

    // 画像が選択・撮影された時の処理
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        resultDiv.style.display = 'none';
        canvas.style.display = 'none';
        controlsDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        const img = new Image();
        const reader = new FileReader();

        reader.onload = function(event) {
            img.onload = function() {
                currentImg = img; // 画像を保持
                processImage();
                controlsDiv.style.display = 'block'; // コントロールを表示
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // スライダーを動かした時の処理
    contrastSlider.addEventListener('input', function() {
        contrastVal.textContent = this.value;
        if (currentImg) {
            processImage();
        }
    });

    // 画像処理と線抽出
    function processImage() {
        if (!currentImg) return;

        const img = currentImg;
        const MAX_WIDTH = 600;
        let width = img.width;
        let height = img.height;

        if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
        }

        canvas.width = width;
        canvas.height = height;
        
        // 作業用の一時的なキャンバス描画
        ctx.drawImage(img, 0, 0, width, height);
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;

        // グレースケール化
        const grayscale = new Uint8ClampedArray(width * height);
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const gray = 0.299 * r + 0.587 * g + 0.114 * b;
            grayscale[i / 4] = gray;
        }

        // Sobelフィルタでエッジ抽出
        const sobelData = new Uint8ClampedArray(width * height * 4);
        const kernelX = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
        const kernelY = [-1, -2, -1, 0, 0, 0, 1, 2, 1];

        let lineIntensity = 0;

        // スライダーの値に基づいた「しきい値」の計算
        // 100%のとき基準値80。感度を上げるとしきい値が下がり、より細かい線を拾う
        const sensitivity = parseInt(contrastSlider.value);
        const threshold = (80 * 100) / sensitivity;

        for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
                let pixelX = 0;
                let pixelY = 0;

                for (let j = -1; j <= 1; j++) {
                    for (let i = -1; i <= 1; i++) {
                        const idx = ((y + j) * width + (x + i));
                        const weightX = kernelX[(j + 1) * 3 + (i + 1)];
                        const weightY = kernelY[(j + 1) * 3 + (i + 1)];
                        pixelX += grayscale[idx] * weightX;
                        pixelY += grayscale[idx] * weightY;
                    }
                }

                let magnitude = Math.sqrt(pixelX * pixelX + pixelY * pixelY);
                
                // 動的しきい値による判定
                if (magnitude > threshold) {
                    magnitude = 0; // 線を黒
                    lineIntensity++;
                } else {
                    magnitude = 255; // 背景を白
                }

                const index = (y * width + x) * 4;
                sobelData[index] = magnitude;
                sobelData[index + 1] = magnitude;
                sobelData[index + 2] = magnitude;
                sobelData[index + 3] = 255;
            }
        }

        const newImageData = new ImageData(sobelData, width, height);
        ctx.putImageData(newImageData, 0, 0);

        canvas.style.display = 'block';
        loadingDiv.style.display = 'none';

        generateFortune(lineIntensity, width * height);
    }

    function generateFortune(lineIntensity, totalPixels) {
        const lineRatio = lineIntensity / totalPixels;
        let resultHtml = "<strong>🔮 診断結果:</strong><br><br>";

        if (lineRatio > 0.08) {
            resultHtml += "手のひらに多くの線が刻まれています。感受性が豊かで、様々なことに気が付く繊細な心の持ち主です。多くの経験から学ぶことができる大器晩成型です。";
        } else if (lineRatio > 0.04) {
            resultHtml += "主要な線がはっきりと見えます。バランス感覚に優れ、論理的思考と直感のバランスが良い状態です。現在の取り組みが着実に成果に結びつくでしょう。";
        } else {
            resultHtml += "線が少なくすっきりとした手相です。物事をシンプルに捉え、決断力があるタイプです。迷いが少なく、一度決めた目標に向かって一直線に進む力を持っています。";
        }

        const luckTypes = ["仕事運", "金運", "対人運", "健康運"];
        const luckyType = luckTypes[Math.floor(Math.random() * luckTypes.length)];
        resultHtml += `<br><br>💡 現在特に高まっているのは<strong>【${luckyType}】</strong>です。`;

        resultDiv.innerHTML = resultHtml;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
