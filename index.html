<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI手相占い - プレミアム版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f2f5; color: #2c3e50; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a2a6c; margin-bottom: 10px; font-size: 1.8em; }
        .description { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; }
        .btn { display: inline-block; background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: #fff; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1em; font-weight: bold; border: none; }
        /* 読み込み中表示 */
        #loading { display: none; margin: 20px 0; color: #b21f1f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        canvas { max-width: 100%; height: auto; border: 2px solid #ecf0f1; border-radius: 10px; margin-top: 20px; display: none; }
        #result { text-align: left; background: #fdfdfd; padding: 20px; border-radius: 10px; border-left: 5px solid #1a2a6c; margin-top: 25px; display: none; }
        #controls { display: none; margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .line-result { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .line-title { font-weight: bold; color: #b21f1f; }
        .analysis-tag { display: inline-block; background: #34495e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75em; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ AI プレミアム手相鑑定</h1>
    <p class="description">手のひらを撮影して運勢を解析します</p>
    
    <label class="btn">
        写真を撮影・選択する
        <input type="file" accept="image/*" capture="environment" id="imageInput" style="display:none;">
    </label>

    <div id="loading">✨ AI解析中... 少々お待ちください ✨</div>

    <div id="controls">
        <label>描出感度: <span id="contrastVal">120</span>%</label><br>
        <input type="range" id="contrastSlider" min="50" max="300" value="120" style="width: 80%;">
    </div>

    <canvas id="canvas"></canvas>
    <div id="result"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultDiv = document.getElementById('result');
    const controlsDiv = document.getElementById('controls');
    const loadingDiv = document.getElementById('loading');
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastVal = document.getElementById('contrastVal');

    let currentImg = null;

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // UIリセット
        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        canvas.style.display = 'none';

        // URL.createObjectURL は FileReader より高速でメモリ効率が良い
        const imageUrl = URL.createObjectURL(file);
        const img = new Image();
        
        img.onload = () => {
            currentImg = img;
            // 描画まで一瞬時間を置くことでUIのフリーズを防ぐ
            setTimeout(() => {
                processImage();
                loadingDiv.style.display = 'none';
                controlsDiv.style.display = 'block';
                // メモリ解放
                URL.revokeObjectURL(imageUrl);
            }, 100);
        };
        img.src = imageUrl;

        // 入力をリセット（同じ写真を再度選んでも発火するようにする）
        this.value = '';
    });

    contrastSlider.addEventListener('change', () => {
        contrastVal.textContent = contrastSlider.value;
        if (currentImg) processImage();
    });

    function processImage() {
        if (!currentImg) return;
        
        // 解析サイズを制限して高速化
        const MAX_WIDTH = 800;
        let width = currentImg.width;
        let height = currentImg.height;
        if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
        }
        
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(currentImg, 0, 0, width, height);

        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;
        const grayscale = new Uint8ClampedArray(width * height);
        
        for (let i = 0; i < data.length; i += 4) {
            grayscale[i / 4] = (data[i] + data[i+1] + data[i+2]) / 3;
        }

        const sobelData = new Uint8ClampedArray(width * height * 4);
        const threshold = (100 * 100) / parseInt(contrastSlider.value);
        let stats = { life: 0, head: 0, heart: 0, fate: 0 };

        for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
                const idx = (y * width + x);
                const valX = grayscale[idx+1] - grayscale[idx-1];
                const valY = grayscale[idx+width] - grayscale[idx-width];
                const magnitude = Math.sqrt(valX * valX + valY * valY);
                
                const isLine = magnitude > threshold;
                const pixelIdx = idx * 4;
                
                // 描画（線部分は暗く、背景は明るく）
                const color = isLine ? 50 : 255;
                sobelData[pixelIdx] = sobelData[pixelIdx+1] = sobelData[pixelIdx+2] = color;
                sobelData[pixelIdx+3] = 255;

                if (isLine) {
                    if (x < width * 0.4 && y > height * 0.4) stats.life++;
                    else if (y > height * 0.35 && y < height * 0.6) stats.head++;
                    else if (y < height * 0.4) stats.heart++;
                    if (x > width * 0.45 && x < width * 0.55) stats.fate++;
                }
            }
        }
        
        ctx.putImageData(new ImageData(sobelData, width, height), 0, 0);
        canvas.style.display = 'block';
        generateFortune(stats, width * height);
    }

    function generateFortune(stats, total) {
        const r = {
            life: (stats.life / total) * 100,
            head: (stats.head / total) * 100,
            heart: (stats.heart / total) * 100,
            fate: (stats.fate / total) * 100
        };

        let html = "<h2 style='text-align:center;'>鑑定結果</h2>";
        
        const lines = [
            { name: "生命線", val: r.life, good: "バイタリティに溢れています", bad: "少しお疲れ気味かもしれません", th: 1.2 },
            { name: "知能線", val: r.head, good: "非常に論理的な思考の持ち主です", bad: "直感力が冴え渡っています", th: 1.2 },
            { name: "感情線", val: r.heart, good: "情熱的で豊かな心の持ち主です", bad: "冷静沈着で安定した精神状態です", th: 1.2 },
            { name: "運命線", val: r.fate, good: "強い使命感を持っています", bad: "現在は変化を求めている時期です", th: 0.3 }
        ];

        lines.forEach(l => {
            const status = l.val > l.th ? "良好" : "安定";
            html += `<div class="line-result"><div class="line-title">${l.name}<span class="analysis-tag">${status}</span></div>`;
            html += l.val > l.th ? l.good : l.bad;
            html += "</div>";
        });

        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
