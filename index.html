<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI手相占い - 自動回転＆2値化版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f2f5; color: #2c3e50; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a2a6c; margin-bottom: 10px; font-size: 1.8em; }
        .description { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; }
        .btn { display: inline-block; background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: #fff; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-size: 1em; font-weight: bold; border: none; margin: 5px; }
        .btn-analyze { background: #27ae60; width: 80%; margin-top: 20px; font-size: 1.2em; }
        
        #loading { display: none; margin: 20px 0; color: #b21f1f; font-weight: bold; }
        
        canvas { max-width: 100%; height: auto; border: 2px solid #ecf0f1; border-radius: 10px; margin-top: 20px; display: none; }
        #result { text-align: left; background: #fdfdfd; padding: 20px; border-radius: 10px; border-left: 5px solid #1a2a6c; margin-top: 25px; display: none; }
        #controls { display: none; margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .line-result { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .line-title { font-weight: bold; color: #b21f1f; }
        .analysis-tag { display: inline-block; background: #34495e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75em; margin-left: 10px; }
        input[type="range"] { width: 80%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ AI 2値化手相鑑定</h1>
    <p class="description">撮影後、掌線が黒くはっきり見えるように感度を調整してください</p>
    
    <label class="btn">
        写真を撮影・選択する
        <input type="file" accept="image/*" capture="environment" id="imageInput" style="display:none;">
    </label>

    <div id="loading">✨ 処理中... ✨</div>

    <div id="controls">
        <label>抽出感度調整: <span id="contrastVal">128</span></label><br>
        <input type="range" id="contrastSlider" min="0" max="255" value="128">
        <p style="font-size: 11px; color: #666;">※画像は自動で反時計回りに90度回転されています</p>
        
        <button class="btn btn-analyze" id="analyzeBtn">🔮 鑑定を開始する</button>
    </div>

    <canvas id="canvas"></canvas>
    <div id="result"></div>
</div>

<!-- Worker用スクリプト: 2値化と解析 -->
<script id="worker-script" type="text/javascript-worker">
    self.onmessage = function(e) {
        const { imageData, width, height, threshold, doStats } = e.data;
        const data = imageData.data;
        const output = new Uint8ClampedArray(data.length);
        let stats = { life: 0, head: 0, heart: 0, fate: 0 };

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const i = (y * width + x) * 4;
                // 輝度の算出
                const brightness = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                const isLine = brightness < threshold;
                const color = isLine ? 0 : 255;

                output[i] = output[i+1] = output[i+2] = color;
                output[i+3] = 255;

                if (doStats && isLine) {
                    // 各手相線のエリア判定ロジック
                    if (x < width * 0.4 && y > height * 0.45) stats.life++;
                    else if (y > height * 0.35 && y < height * 0.6) stats.head++;
                    else if (y < height * 0.4) stats.heart++;
                    if (x > width * 0.45 && x < width * 0.55 && y > height * 0.2) stats.fate++;
                }
            }
        }
        self.postMessage({ output, stats, doStats });
    };
</script>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultDiv = document.getElementById('result');
    const controlsDiv = document.getElementById('controls');
    const loadingDiv = document.getElementById('loading');
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastVal = document.getElementById('contrastVal');
    const analyzeBtn = document.getElementById('analyzeBtn');

    let currentImg = null;
    let rotation = 270; // 反時計回り90度（時計回り270度）をデフォルトに設定

    const blob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
    const worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = function(e) {
        const { output, stats, doStats } = e.data;
        const imageData = new ImageData(output, canvas.width, canvas.height);
        ctx.putImageData(imageData, 0, 0);
        
        loadingDiv.style.display = 'none';
        canvas.style.display = 'block';
        controlsDiv.style.display = 'block';

        if (doStats) {
            generateFortune(stats, canvas.width * canvas.height);
        }
    };

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        canvas.style.display = 'none';
        controlsDiv.style.display = 'none';
        
        const img = new Image();
        img.onload = () => {
            currentImg = img;
            processImage(false); // 読み込み時はプレビューのみ
        };
        img.src = URL.createObjectURL(file);
        this.value = '';
    });

    // スライダー変更時にリアルタイムで2値化プレビューを更新
    contrastSlider.addEventListener('input', () => {
        contrastVal.textContent = contrastSlider.value;
        if (currentImg) processImage(false); 
    });

    // 鑑定ボタンで集計処理を実行
    analyzeBtn.addEventListener('click', () => {
        loadingDiv.style.display = 'block';
        processImage(true); 
    });

    function processImage(doStats) {
        const MAX_SIZE = 500; // フリーズ防止用の解像度制限
        let w = currentImg.width;
        let h = currentImg.height;

        if (w > h) {
            if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
        } else {
            if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
        }

        // 90度（または270度）回転時は幅と高さを入れ替える
        canvas.width = h;
        canvas.height = w;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.drawImage(currentImg, -w / 2, -h / 2, w, h);
        ctx.restore();

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        worker.postMessage({
            imageData,
            width: canvas.width,
            height: canvas.height,
            threshold: parseInt(contrastSlider.value),
            doStats: doStats
        });
    }

    function generateFortune(stats, total) {
        const ratio = {
            life: (stats.life / total) * 100,
            head: (stats.head / total) * 100,
            heart: (stats.heart / total) * 100,
            fate: (stats.fate / total) * 100
        };

        let html = "<h2 style='text-align:center;'>鑑定結果</h2>";
        const lines =
