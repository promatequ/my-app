<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI手相鑑定 - 高速安定版</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: auto; border-radius: 8px; display: none; background: #000; margin-top: 15px; }
        .btn { background: #1a2a6c; color: white; padding: 12px 20px; border-radius: 25px; cursor: pointer; display: inline-block; font-weight: bold; margin: 10px 0; border: none; }
        #controls { display: none; padding: 15px; background: #eee; border-radius: 10px; margin-top: 10px; }
        input[type="range"] { width: 90%; margin: 10px 0; }
        #loading { display: none; color: #b21f1f; font-weight: bold; padding: 10px; }
        #result { display: none; text-align: left; padding: 15px; border-left: 5px solid #1a2a6c; background: #fafafa; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>✋ AI 手相鑑定</h1>
    <p style="font-size: 0.85em; color: #666;">撮影後、掌線が白く浮き出るように調整してください</p>

    <label class="btn">
        📷 写真を撮る / 選ぶ
        <input type="file" accept="image/*" capture="environment" id="imageInput" style="display:none;">
    </label>

    <div id="loading">⏳ 処理中...</div>

    <div id="controls">
        <label>抽出感度: <span id="val">128</span></label><br>
        <input type="range" id="slider" min="0" max="255" value="128">
        <button class="btn" style="background:#27ae60; width:100%;" id="analyzeBtn">🔮 鑑定実行</button>
    </div>

    <canvas id="canvas"></canvas>
    <div id="result"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const slider = document.getElementById('slider');
    const valDisp = document.getElementById('val');
    const controls = document.getElementById('controls');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');

    let originalData = null; // 回転・リサイズ済みの元データ（グレースケール）
    let isDrawing = false;   // 二重描画防止

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        loading.style.display = 'block';
        const img = new Image();
        img.onload = () => {
            setupCanvas(img);
            loading.style.display = 'none';
            controls.style.display = 'block';
            canvas.style.display = 'block';
            updateThreshold(); // 初回描画
        };
        img.src = URL.createObjectURL(file);
    });

    // キャンバスの初期設定（回転・リサイズ・グレースケール化）
    function setupCanvas(img) {
        const MAX_SIZE = 500; // 処理負荷を最小限にするサイズ
        let w = img.width;
        let h = img.height;

        if (w > h) {
            if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
        } else {
            if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
        }

        // 90度回転用に幅と高さを入れ替え
        canvas.width = h;
        canvas.height = w;

        // 回転して描画
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(-90 * Math.PI / 180);
        ctx.drawImage(img, -w/2, -h/2, w, h);
        ctx.restore();

        // 後の処理を速くするため、この時点でグレースケール化したデータを保持する
        const raw = ctx.getImageData(0, 0, canvas.width, canvas.height);
        originalData = new Uint8ClampedArray(canvas.width * canvas.height);
        for (let i = 0; i < raw.data.length; i += 4) {
            // 輝度計算
            originalData[i/4] = (raw.data[i] + raw.data[i+1] + raw.data[i+2]) / 3;
        }
    }

    // スライダー操作（超高速応答）
    slider.addEventListener('input', () => {
        valDisp.textContent = slider.value;
        if (!isDrawing) {
            isDrawing = true;
            // 次の描画可能タイミングまで待機（フリーズ防止の肝）
            requestAnimationFrame(() => {
                updateThreshold();
                isDrawing = false;
            });
        }
    });

    function updateThreshold() {
        if (!originalData) return;
        const threshold = parseInt(slider.value);
        const imgData = ctx.createImageData(canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < originalData.length; i++) {
            // しきい値より暗い部分を「白(255)」にする（掌線抽出）
            const v = originalData[i] < threshold ? 255 : 0;
            const idx = i * 4;
            data[idx] = data[idx+1] = data[idx+2] = v;
            data[idx+3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    document.getElementById('analyzeBtn').addEventListener('click', () => {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<h3>鑑定結果</h3><p>調整された画像に基づき、あなたの運勢を解析しました。主要な線がはっきりと白く出ているほど、現在のエネルギーが強い状態です。</p>`;
        window.scrollTo(0, document.body.scrollHeight);
    });
</script>

</body>
</html>
